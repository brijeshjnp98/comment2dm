name: comment2dm
description: "Comment2DM - Automate Your Instagram Engagement"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  
  # HTTP & API
  http: ^1.3.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  
  # Storage & Auth
  flutter_secure_storage: ^9.2.4
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Payments
  stripe_payment: ^1.1.4
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/